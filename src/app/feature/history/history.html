<div class="bg-[#f5f5f5] dark:bg-[#0a0a0a] min-h-screen transition-colors duration-300">

    <div class="px-4 sm:px-6 py-4 sm:py-6 max-w-5xl mx-auto">

        <!-- CARD -->
        <div class="bg-white dark:bg-[#1a1a1a] rounded-2xl shadow p-4 sm:p-6">

            <!-- HEADER -->
            <div class="flex items-center gap-3 mb-6">

                <button 
                    (click)="goBack()"
                    class="w-8 h-8 rounded-full bg-white/10 dark:bg-[#111] flex items-center justify-center shadow hover:scale-110 transition"
                >
                    <i class="fa-solid fa-arrow-left text-orange-500"></i>
                </button>

                <h1 class="text-lg sm:text-xl font-bold dark:text-white">
                    History
                </h1>

            </div>

            <!-- FILTER TABS -->
            <div class="flex gap-2 mb-6">

                <button 
                    (click)="setFilter('all')"
                    [class]="tabClass('all')">
                    All
                </button>

                <button 
                    (click)="setFilter('Delivered')"
                    [class]="tabClass('Delivered')">
                    Delivered
                </button>

                <button 
                    (click)="setFilter('Cancelled')"
                    [class]="tabClass('Cancelled')">
                    Cancelled
                </button>

            </div>

            <!-- LIST -->
            <div class="flex flex-col gap-4">

                <div *ngFor="let item of filteredHistory"
                     class="bg-gray-100 dark:bg-[#111] rounded-xl p-4">

                    <!-- TOP -->
                    <div class="flex justify-between items-center mb-2">

                        <h3 class="font-semibold dark:text-white text-sm sm:text-base">
                            {{item.title}}
                        </h3>

                        <span 
                          class="text-xs px-3 py-1 rounded-full"
                          [ngClass]="getStatusClass(item.status)">
                          {{item.status}}
                        </span>

                    </div>

                    <!-- DETAILS -->
                    <div class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 space-y-1">
                        <p>{{item.from}} → {{item.to}}</p>
                        <p>Date: {{item.date}}</p>
                        <p>Price: <span class="text-orange-500">{{item.price}}</span></p>
                    </div>

                </div>

                <!-- EMPTY STATE -->
                <div *ngIf="filteredHistory.length === 0"
                     class="text-center text-gray-400 py-6">
                    No history found
                </div>

            </div>

        </div>

    </div>

</div>
