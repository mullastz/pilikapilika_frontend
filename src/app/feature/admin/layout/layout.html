<div class="min-h-screen bg-gray-50 dark:bg-[#0a0a0a] flex transition-colors">

  <!-- Desktop Sidebar -->
  <aside
    class="hidden lg:flex flex-col bg-white dark:bg-[#1a1a1a] border-r border-gray-200 dark:border-gray-800 transition-all duration-300"
    [class.w-64]="sidebarOpen()"
    [class.w-20]="!sidebarOpen()"
  >
    <!-- Logo -->
    <div class="h-16 flex items-center px-4 border-b border-gray-200 dark:border-gray-800">
      <div class="w-10 h-10 rounded-xl bg-[#FF7800] flex items-center justify-center text-white font-bold text-lg shrink-0">
        P
      </div>
      @if (sidebarOpen()) {
        <span class="ml-3 font-bold text-gray-900 dark:text-white whitespace-nowrap overflow-hidden">Admin</span>
      }
    </div>

    <!-- Nav -->
    <nav class="flex-1 py-4 px-2 space-y-1 overflow-y-auto">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        [class.bg-orange-50]="isActive(item.route)"
        [class.dark:bg-orange-900/20]="isActive(item.route)"
        [class.text-[#FF7800]]="isActive(item.route)"
        [class.text-gray-600]="!isActive(item.route)"
        [class.dark:text-gray-400]="!isActive(item.route)"
        class="flex items-center px-3 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-[#222] transition-colors"
        [title]="!sidebarOpen() ? item.label : ''"
      >
        <i [class]="item.icon + ' w-5 text-center'" [class.text-[#FF7800]]="isActive(item.route)"></i>
        @if (sidebarOpen()) {
          <span class="ml-3 whitespace-nowrap overflow-hidden">{{ item.label }}</span>
        }
      </a>
    </nav>

    <!-- Toggle & Logout -->
    <div class="p-2 border-t border-gray-200 dark:border-gray-800">
      <button
        (click)="toggleSidebar()"
        class="w-full flex items-center justify-center px-3 py-2 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-[#222] transition-colors"
        [title]="sidebarOpen() ? 'Collapse' : 'Expand'"
      >
        <i [class]="sidebarOpen() ? 'fa-solid fa-chevron-left' : 'fa-solid fa-chevron-right'"></i>
      </button>
      <button
        (click)="logout()"
        class="w-full flex items-center px-3 py-2.5 rounded-xl text-sm font-medium text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors mt-1"
      >
        <i class="fa-solid fa-arrow-right-from-bracket w-5 text-center"></i>
        @if (sidebarOpen()) {
          <span class="ml-3 whitespace-nowrap overflow-hidden">Logout</span>
        }
      </button>
    </div>
  </aside>

  <!-- Mobile Sidebar Overlay -->
  @if (mobileMenuOpen()) {
    <div class="fixed inset-0 z-40 lg:hidden" (click)="closeMobileMenu()">
      <div class="absolute inset-0 bg-black/50"></div>
      <aside class="absolute left-0 top-0 bottom-0 w-64 bg-white dark:bg-[#1a1a1a] border-r border-gray-200 dark:border-gray-800 flex flex-col">
        <div class="h-16 flex items-center px-4 border-b border-gray-200 dark:border-gray-800 justify-between">
          <div class="flex items-center">
            <div class="w-10 h-10 rounded-xl bg-[#FF7800] flex items-center justify-center text-white font-bold text-lg">P</div>
            <span class="ml-3 font-bold text-gray-900 dark:text-white">Admin</span>
          </div>
          <button (click)="closeMobileMenu()" class="text-gray-500 dark:text-gray-400 p-1">
            <i class="fa-solid fa-xmark text-xl"></i>
          </button>
        </div>
        <nav class="flex-1 py-4 px-2 space-y-1">
          <a
            *ngFor="let item of navItems"
            [routerLink]="item.route"
            (click)="closeMobileMenu()"
            [class.bg-orange-50]="isActive(item.route)"
            [class.dark:bg-orange-900/20]="isActive(item.route)"
            [class.text-[#FF7800]]="isActive(item.route)"
            [class.text-gray-600]="!isActive(item.route)"
            [class.dark:text-gray-400]="!isActive(item.route)"
            class="flex items-center px-3 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-[#222] transition-colors"
          >
            <i [class]="item.icon + ' w-5 text-center'"></i>
            <span class="ml-3">{{ item.label }}</span>
          </a>
        </nav>
        <div class="p-2 border-t border-gray-200 dark:border-gray-800">
          <button (click)="logout(); closeMobileMenu()" class="w-full flex items-center px-3 py-2.5 rounded-xl text-sm font-medium text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
            <i class="fa-solid fa-arrow-right-from-bracket w-5 text-center"></i>
            <span class="ml-3">Logout</span>
          </button>
        </div>
      </aside>
    </div>
  }

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Mobile Header -->
    <header class="lg:hidden h-16 bg-white dark:bg-[#1a1a1a] border-b border-gray-200 dark:border-gray-800 flex items-center px-4 justify-between shrink-0">
      <button (click)="toggleMobileMenu()" class="text-gray-600 dark:text-gray-300 p-2">
        <i class="fa-solid fa-bars text-lg"></i>
      </button>
      <div class="w-8 h-8 rounded-lg bg-[#FF7800] flex items-center justify-center text-white font-bold">P</div>
      <div class="w-8"></div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
