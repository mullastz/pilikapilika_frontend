<div class="bg-[#f5f5f5] dark:bg-[#0a0a0a] min-h-screen transition-colors duration-300">

    <div class="px-4 sm:px-6 py-4 sm:py-6 max-w-5xl mx-auto">

        <!-- CARD -->
        <div class="bg-[#f5f5f5] dark:bg-[#0a0a0a] rounded-2xl transition-colors">

            <!-- HEADER -->
            <div class="flex items-center gap-3 mb-6">

                <button
                    (click)="goBack()"
                    class="w-8 h-8 rounded-full bg-white/10 dark:bg-[#333] flex items-center justify-center shadow hover:scale-110 transition"
                >
                    <i class="fa-solid fa-arrow-left text-orange-500"></i>
                </button>

                <h1 class="text-lg sm:text-xl font-bold dark:text-white">
                    Manage Account
                </h1>

            </div>

            <!-- LOADING STATE -->
            <div *ngIf="isLoading" class="flex justify-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-500"></div>
            </div>

            <!-- PROFILE FORM -->
            <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" *ngIf="!isLoading">

                <!-- PROFILE IMAGE -->
                <div class="flex flex-col items-center mb-6">

                    <!-- Hidden file input -->
                    <input
                        #photoInput
                        type="file"
                        accept="image/jpeg,image/jpg,image/png,image/webp"
                        class="hidden"
                        (change)="onPhotoSelected($event)"
                    />

                    <!-- Avatar with upload overlay -->
                    <div class="relative group mb-3">
                        <img
                            [src]="currentPhotoSrc"
                            alt="Profile photo"
                            class="w-24 h-24 rounded-full object-cover border-2 border-orange-500"
                        />
                        <!-- Hover overlay -->
                        <button
                            type="button"
                            (click)="triggerPhotoInput()"
                            class="absolute inset-0 rounded-full bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                            aria-label="Change profile photo"
                        >
                            <i class="fa-solid fa-camera text-white text-lg"></i>
                        </button>
                    </div>

                    <!-- Action buttons shown only when a new photo is selected -->
                    <div *ngIf="selectedPhotoFile" class="flex items-center gap-3">
                        <button
                            type="button"
                            (click)="uploadPhoto()"
                            [disabled]="isUploadingPhoto"
                            class="flex items-center gap-2 bg-orange-500 text-white text-sm px-4 py-1.5 rounded-full hover:bg-orange-600 transition disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <span *ngIf="isUploadingPhoto" class="animate-spin rounded-full h-3 w-3 border-b-2 border-white"></span>
                            {{ isUploadingPhoto ? 'Uploading...' : 'Save Photo' }}
                        </button>
                        <button
                            type="button"
                            (click)="cancelPhotoSelection()"
                            [disabled]="isUploadingPhoto"
                            class="text-sm text-gray-500 dark:text-gray-400 hover:text-red-500 transition"
                        >
                            Cancel
                        </button>
                    </div>

                    <!-- Default prompt when no photo is pending -->
                    <button
                        *ngIf="!selectedPhotoFile"
                        type="button"
                        (click)="triggerPhotoInput()"
                        class="text-sm text-orange-500 hover:underline"
                    >
                        Change Photo
                    </button>

                    <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">
                        JPEG, PNG or WebP · max 2 MB
                    </p>

                </div>

                <!-- FORM GRID -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

                    <!-- FIRST NAME -->
                    <div>
                        <label class="text-sm text-gray-500 dark:text-gray-400">First Name *</label>
                        <input
                            type="text"
                            formControlName="firstname"
                            class="w-full mt-1 p-3 rounded-xl bg-gray-200 dark:bg-[#333] dark:text-white outline-none focus:ring-2 focus:ring-orange-500"
                            [class.ring-2]="firstname?.invalid && firstname?.touched"
                            [class.ring-red-500]="firstname?.invalid && firstname?.touched"
                        />
                        <div *ngIf="firstname?.invalid && firstname?.touched" class="text-red-500 text-xs mt-1">
                            First name is required
                        </div>
                    </div>

                    <!-- LAST NAME -->
                    <div>
                        <label class="text-sm text-gray-500 dark:text-gray-400">Last Name *</label>
                        <input
                            type="text"
                            formControlName="lastname"
                            class="w-full mt-1 p-3 rounded-xl bg-gray-200 dark:bg-[#333] dark:text-white outline-none focus:ring-2 focus:ring-orange-500"
                            [class.ring-2]="lastname?.invalid && lastname?.touched"
                            [class.ring-red-500]="lastname?.invalid && lastname?.touched"
                        />
                        <div *ngIf="lastname?.invalid && lastname?.touched" class="text-red-500 text-xs mt-1">
                            Last name is required
                        </div>
                    </div>

                    <!-- GENDER -->
                    <div>
                        <label class="text-sm text-gray-500 dark:text-gray-400">Gender *</label>
                        <select
                            formControlName="gender"
                            class="w-full mt-1 p-3 rounded-xl bg-gray-200 dark:bg-[#333] dark:text-white outline-none focus:ring-2 focus:ring-orange-500 appearance-none cursor-pointer"
                            [class.ring-2]="gender?.invalid && gender?.touched"
                            [class.ring-red-500]="gender?.invalid && gender?.touched"
                        >
                            <option value="">Select Gender</option>
                            <option *ngFor="let option of genderOptions" [value]="option">{{ option }}</option>
                        </select>
                        <div *ngIf="gender?.invalid && gender?.touched" class="text-red-500 text-xs mt-1">
                            Gender is required
                        </div>
                    </div>

                    <!-- EMAIL (Read-only) -->
                    <div>
                        <label class="text-sm text-gray-500 dark:text-gray-400">Email</label>
                        <input
                            type="email"
                            formControlName="email"
                            class="w-full mt-1 p-3 rounded-xl bg-gray-200 dark:bg-[#222] dark:text-gray-400 outline-none cursor-not-allowed"
                            readonly
                        />
                        <p class="text-xs text-gray-400 mt-1">Email cannot be changed</p>
                    </div>

                    <!-- PHONE -->
                    <div>
                        <label class="text-sm text-gray-500 dark:text-gray-400">Phone</label>
                        <input
                            type="tel"
                            formControlName="phone"
                            class="w-full mt-1 p-3 rounded-xl bg-gray-200 dark:bg-[#333] dark:text-white outline-none focus:ring-2 focus:ring-orange-500"
                        />
                    </div>

                    <!-- REGION -->
                    <div>
                        <label class="text-sm text-gray-500 dark:text-gray-400">Region</label>
                        <input
                            type="text"
                            formControlName="region"
                            class="w-full mt-1 p-3 rounded-xl bg-gray-200 dark:bg-[#333] dark:text-white outline-none focus:ring-2 focus:ring-orange-500"
                            placeholder="Enter region"
                        />
                    </div>

                    <!-- DISTRICT -->
                    <div>
                        <label class="text-sm text-gray-500 dark:text-gray-400">District</label>
                        <input
                            type="text"
                            formControlName="district"
                            class="w-full mt-1 p-3 rounded-xl bg-gray-200 dark:bg-[#333] dark:text-white outline-none focus:ring-2 focus:ring-orange-500"
                            placeholder="Enter district"
                        />
                    </div>

                    <!-- WARD -->
                    <div>
                        <label class="text-sm text-gray-500 dark:text-gray-400">Ward</label>
                        <input
                            type="text"
                            formControlName="ward"
                            class="w-full mt-1 p-3 rounded-xl bg-gray-200 dark:bg-[#333] dark:text-white outline-none focus:ring-2 focus:ring-orange-500"
                        />
                    </div>

                    <!-- ADDRESS -->
                    <div class="sm:col-span-2">
                        <label class="text-sm text-gray-500 dark:text-gray-400">Address</label>
                        <textarea
                            formControlName="address"
                            rows="3"
                            class="w-full mt-1 p-3 rounded-xl bg-gray-200 dark:bg-[#333] dark:text-white outline-none focus:ring-2 focus:ring-orange-500 resize-none"
                        ></textarea>
                    </div>

                </div>

                <!-- SAVE BUTTON -->
                <div class="mt-6 text-center">
                    <button
                        type="submit"
                        [disabled]="isSaving"
                        class="bg-orange-500 text-white px-6 py-3 rounded-full hover:scale-105 transition shadow disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 mx-auto"
                    >
                        <span *ngIf="isSaving" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
                        {{ isSaving ? 'Saving...' : 'Save Changes' }}
                    </button>
                </div>

            </form>

            <!-- DIVIDER -->
            <div class="border-t border-gray-200 dark:border-gray-700 my-6"></div>

            <!-- CHANGE PASSWORD SECTION -->
            <div class="mt-6">

                <!-- PASSWORD CHANGE SECTION -->
                <div class="max-w-md mx-auto">

                    <!-- Initial State - Show Change Password Button -->
                    <div *ngIf="!passwordChangeRequested" class="text-center">
                        <button
                            type="button"
                            (click)="requestPasswordChange()"
                            [disabled]="isRequestingPasswordChange"
                            class="text-orange-500 hover:text-orange-600 font-medium text-sm flex items-center justify-center gap-2 mx-auto"
                        >
                            <i class="fa-solid fa-lock"></i>
                            {{ isRequestingPasswordChange ? 'Sending...' : 'Change Password' }}
                        </button>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">
                            A secure link will be sent to your email
                        </p>
                    </div>

                    <!-- Success State - Email Sent -->
                    <div *ngIf="passwordChangeRequested" class="text-center p-4 bg-green-50 dark:bg-green-900/20 rounded-xl">
                        <div class="w-12 h-12 bg-green-100 dark:bg-green-900/40 rounded-full flex items-center justify-center mx-auto mb-3">
                            <i class="fa-solid fa-check text-green-600"></i>
                        </div>
                        <h3 class="font-semibold text-green-800 dark:text-green-400 mb-1">Check Your Email!</h3>
                        <p class="text-sm text-green-700 dark:text-green-300">
                            We've sent a secure link to <strong>{{ user?.email }}</strong> to change your password.
                        </p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-3">
                            Didn't receive it?
                            <button
                                type="button"
                                (click)="requestPasswordChange()"
                                [disabled]="isRequestingPasswordChange"
                                class="text-orange-500 hover:text-orange-600 font-medium underline ml-1"
                            >
                                {{ isRequestingPasswordChange ? 'Sending...' : 'Resend' }}
                            </button>
                        </p>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
