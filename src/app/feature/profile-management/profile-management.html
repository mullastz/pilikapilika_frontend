<div class="bg-[#f5f5f5] dark:bg-[#0a0a0a] min-h-screen transition-colors duration-300">

    <div class="px-4 sm:px-6 py-4 sm:py-6 max-w-5xl mx-auto">

        <!-- ACCOUNT CARD -->
        <div class="bg-[#f5f5f5] dark:bg-[#0a0a0a] rounded-2xl transition-colors">
            <!-- TOP HEADER (BACK + TITLE) -->
            <div class="flex items-center gap-3 mb-10">

                <!-- BACK BUTTON -->
                <button 
                    (click)="goBack()"
                    class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-white/10 dark:bg-[#333] backdrop-blur-md shadow hover:scale-110 transition flex items-center justify-center"
                    aria-label="Go back"
                >
                    <i class="fa-solid fa-arrow-left text-orange-500 text-sm sm:text-base"></i>
                </button>

                <!-- TITLE -->
                <h1 class="text-base sm:text-lg font-bold dark:text-white">
                    Profile Settings
                </h1>

            </div>
            <!-- TOP SECTION -->
            <div class="flex items-center justify-between">

                <!-- USER INFO -->
                <div class="flex items-center gap-3 sm:gap-4">

                    <!-- PROFILE IMAGE -->
                    <img 
                        src="assets/landingpage_images/profile1.webp" 
                        class="w-14 h-14 sm:w-16 sm:h-16 rounded-full object-cover border-2 border-orange-500"
                    />

                    <!-- NAME + LOCATION -->
                    <div>
                        <h2 class="font-semibold text-base sm:text-lg dark:text-white">
                            {{ user?.firstname || 'User' }} {{ user?.lastname || '' }}
                        </h2>
                        <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400">
                            {{ user?.region || 'Unknown Location' }}, Tanzania
                        </p>
                    </div>

                </div>

                <!-- LOGOUT BUTTON -->
                <button 
                (click)="openLogoutModal()"
                    class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-red-500/10 hover:bg-red-500/20 flex items-center justify-center transition"
                    aria-label="Logout"
                >
                    <i class="fa-solid fa-right-from-bracket text-red-500 text-lg"></i>
                </button>

            </div>

            <!-- DIVIDER -->
            <div class="my-4 sm:my-6 border-t border-gray-200 dark:border-gray-700"></div>

            <!-- MY ACCOUNT TITLE -->
            <h3 class="text-lg sm:text-xl font-bold mb-6 sm:mb-6 dark:text-white">
                My Account
            </h3>

            <!-- MENU LIST -->
            <div class="flex flex-col gap-3 sm:gap-4">
                
                <!-- DYNAMIC TAB ITEMS -->
                <ng-container *ngFor="let tab of tabs">
                    <div *ngIf="!tab.agentOnly || isAgent"
                         (click)="goTo(tab.id)" 
                         class="flex items-center justify-between {{tab.bgColor}} {{tab.darkBgColor}} p-3 sm:p-4 rounded-xl hover:scale-[1.02] transition cursor-pointer">

                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full {{tab.iconBgColor}} flex items-center justify-center text-white text-lg">
                                <i class="fa-solid {{tab.icon}}"></i>
                            </div>
                            <span class="text-sm sm:text-base dark:text-white">{{tab.title}}</span>
                        </div>

                        <i class="fa-solid fa-chevron-right text-gray-400"></i>

                    </div>
                </ng-container>

            </div>

        </div>

    </div>

</div>

<!-- Logout Confirmation Modal -->
<div *ngIf="showLogoutModal()" 
     class="fixed inset-0 bg-black/70 backdrop-blur-md z-100 flex items-center justify-center p-4">
  
  <div class="bg-white dark:bg-[#0a0a0a] rounded-3xl max-w-sm w-full overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200">

    <!-- Modal Header -->
    <div class="px-6 pt-8 pb-4 text-center">
      <div class="w-20 h-20 mx-auto bg-red-100 dark:bg-red-900/30 rounded-2xl flex items-center justify-center mb-5">
        <i class="fa-solid fa-right-from-bracket text-4xl text-red-500"></i>
      </div>
      <h3 class="text-2xl font-semibold dark:text-white mb-2">Log Out?</h3>
      <p class="text-gray-600 dark:text-gray-400 text-[15px]">
        Are you sure you want to log out from your account?
      </p>
    </div>

    <!-- Actions -->
    <div class="flex border-t border-gray-200 dark:border-gray-700">
      <button 
        (click)="cancelLogout()"
        class="flex-1 py-5 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-[#333] transition-colors">
        Cancel
      </button>
      
      <button 
        (click)="confirmLogout()"
        class="flex-1 py-5 text-base font-semibold bg-red-500 hover:bg-red-600 text-white transition-colors">
        Yes, Log Out
      </button>
    </div>
  </div>
</div>
