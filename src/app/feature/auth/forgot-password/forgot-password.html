<div class="min-h-screen bg-[#f5f5f5] dark:bg-[#0a0a0a] flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[#FF7800] text-white mb-4">
        <i class="fa-solid fa-key text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold dark:text-white">Forgot Password?</h1>
      <p class="text-gray-600 dark:text-gray-400 mt-2">
        Enter your email and we'll send you a link to reset your password.
      </p>
    </div>

    <!-- Form Card -->
    <div class="bg-white dark:bg-[#1a1a1a] rounded-2xl shadow-lg p-6">
      <!-- Success State -->
      <div *ngIf="emailSent()" class="text-center py-8">
        <div class="w-16 h-16 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fa-solid fa-check text-3xl text-green-600"></i>
        </div>
        <h2 class="text-xl font-semibold dark:text-white mb-2">Email Sent!</h2>
        <p class="text-gray-600 dark:text-gray-400 mb-6">
          Check your inbox for the password reset link. The link will expire in 24 hours.
        </p>
        <button
          (click)="goToLogin()"
          class="w-full bg-[#FF7800] text-white py-3 px-6 rounded-full font-semibold hover:bg-orange-600 transition-all"
        >
          Back to Login
        </button>
      </div>

      <!-- Form -->
      <form *ngIf="!emailSent()" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <!-- Email Field -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            Email Address
          </label>
          <input
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            class="w-full p-3 rounded-xl bg-gray-100 dark:bg-[#111] dark:text-white outline-none focus:ring-2 focus:ring-orange-500 transition-all"
            [class.ring-2]="email?.invalid && email?.touched"
            [class.ring-red-500]="email?.invalid && email?.touched"
          />
          <div *ngIf="email?.invalid && email?.touched" class="text-red-500 text-sm mt-1">
            <span *ngIf="email?.errors?.['required']">Email is required</span>
            <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full bg-[#FF7800] text-white py-3 px-6 rounded-full font-semibold hover:bg-orange-600 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span *ngIf="isLoading()" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></span>
          {{ isLoading() ? 'Sending...' : 'Send Reset Link' }}
        </button>

        <!-- Back to Login -->
        <div class="mt-6 text-center">
          <button
            type="button"
            (click)="goToLogin()"
            class="text-[#FF7800] hover:text-orange-600 font-medium text-sm"
          >
            <i class="fa-solid fa-arrow-left mr-1"></i> Back to Login
          </button>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-gray-500 dark:text-gray-400 text-sm mt-8">
      Remember your password?
      <a routerLink="/sign-in" class="text-[#FF7800] hover:text-orange-600 font-medium">Sign in</a>
    </p>
  </div>
</div>
