<div class="min-h-screen bg-white flex flex-col md:flex-row font-sans">

  <!-- Left background shape (desktop only) -->
  <div class="hidden md:block md:w-1/2 h-screen relative overflow-hidden">
    <!-- Irregular card shape with background image -->
    <div 
      class="absolute inset-0 bg-cover bg-center "
      style="background-image: url('/assets/Orange-material-design.avif');
             clip-path: polygon(0 0, 100% 0, 82% 100%, 0 100%);">
    </div>

    <!-- Overlay content on the shaped background -->
    <div class="relative z-10 h-full flex flex-col justify-between p-8 text-white">
      <!-- Back arrow -->
      <button class="self-start text-3xl hover:text-orange-400 transition">
        ←
      </button>

      <!-- Bottom left content -->
      <div class="space-y-4">
        <p class="text-xl font-medium">Already Have an Account?</p>
        <button 
          (click)="goToSignIn()"
          class="px-8 py-3 bg-[#FF7800] hover:bg-orange-700 text-white font-semibold rounded-full transition">
          Sign In
        </button>

        <div class="mt-10">
          <p class="text-3xl font-bold" style="font-family: 'Lobster Two', cursive;">
            Get In Touch With Us
          </p>
          <div class="flex gap-6 mt-4 text-3xl">
            <a href="https://instagram.com/yourprofile" target="_blank" class="hover:text-orange-300">📷</a>
            <a href="https://tiktok.com/@yourprofile" target="_blank" class="hover:text-orange-300">🎵</a>
            <a href="https://facebook.com/yourpage" target="_blank" class="hover:text-orange-300">👍</a>
            <a href="https://x.com/yourhandle" target="_blank" class="hover:text-orange-300">𝕏</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right form area (white space) -->
  <div class="flex-1 flex items-center justify-center p-6 md:p-12 bg-white">
    <div class="w-full max-w-md space-y-8">
      <!-- Logo -->
      <h1 
        class="text-5xl font-bold text-center md:text-left"
        style="color: #FF7800; font-family: 'Lobster Two', cursive;">
        Pilika Pilika
      </h1>

      <!-- Heading -->
      <h2 class="text-3xl font-bold text-gray-800 text-center md:text-left">
        Create Your Account
      </h2>

      <!-- Form -->
      <form class="space-y-6">
        <!-- Full Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Full Name</label>
          <div class="mt-1 relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">👤</span>
            <input 
              type="text" 
              class="block w-full pl-10 pr-3 py-3 border-b-2 border-gray-300 focus:border-[#FF7800] focus:outline-none transition"
              placeholder="Enter your full name"
            />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <div class="mt-1 relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">✉️</span>
            <input 
              type="email" 
              class="block w-full pl-10 pr-3 py-3 border-b-2 border-gray-300 focus:border-[#FF7800] focus:outline-none transition"
              placeholder="Enter your email"
            />
          </div>
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Phone</label>
          <div class="mt-1 relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">📞</span>
            <input 
              type="tel" 
              class="block w-full pl-10 pr-3 py-3 border-b-2 border-gray-300 focus:border-[#FF7800] focus:outline-none transition"
              placeholder="Enter your phone number"
            />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <div class="mt-1 relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">🔒</span>
            <input 
              type="password" 
              class="block w-full pl-10 pr-3 py-3 border-b-2 border-gray-300 focus:border-[#FF7800] focus:outline-none transition"
              placeholder="Create password"
            />
          </div>
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
          <div class="mt-1 relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">🔒</span>
            <input 
              type="password" 
              class="block w-full pl-10 pr-3 py-3 border-b-2 border-gray-300 focus:border-[#FF7800] focus:outline-none transition"
              placeholder="Confirm password"
            />
          </div>
        </div>

        <!-- Client / Agent radio -->
        <div class="flex justify-center md:justify-start gap-8 pt-4">
          <label class="flex items-center gap-2">
            <input type="radio" name="role" value="client" class="text-[#FF7800] focus:ring-[#FF7800]" checked />
            <span class="text-gray-700">Client</span>
          </label>
          <label class="flex items-center gap-2">
            <input type="radio" name="role" value="agent" class="text-[#FF7800] focus:ring-[#FF7800]" />
            <span class="text-gray-700">Agent</span>
          </label>
        </div>

        <!-- Sign Up button -->
        <button 
          type="submit"
          class="w-full py-4 bg-[#FF7800] hover:bg-orange-700 text-white font-bold rounded-full transition text-lg shadow-md">
          Sign Up
        </button>
      </form>
    </div>
  </div>
</div>
