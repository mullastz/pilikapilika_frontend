<div class="bg-white dark:bg-[#1a1a1a] rounded-xl shadow p-4 sm:p-5 flex items-center gap-4 transition-colors">
  <div [class]="color + ' w-12 h-12 rounded-xl flex items-center justify-center text-white text-lg shrink-0'">
    <i [class]="icon"></i>
  </div>
  <div class="min-w-0">
    <p class="text-sm text-gray-500 dark:text-gray-400 truncate">{{ label }}</p>
    <p class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white">{{ value }}</p>
    @if (trend !== undefined) {
      <p class="text-xs mt-0.5" [class.text-green-500]="trend >= 0" [class.text-red-500]="trend < 0">
        <i [class]="trend >= 0 ? 'fa-solid fa-arrow-trend-up' : 'fa-solid fa-arrow-trend-down'"></i>
        {{ trend >= 0 ? '+' : '' }}{{ trend }}% today
      </p>
    }
  </div>
</div>
